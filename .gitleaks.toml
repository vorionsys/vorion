# Gitleaks configuration for Vorion
# https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

[allowlist]
description = "Allowlisted files and patterns"
paths = [
  '''node_modules''',
  '''\.git''',
  '''dist''',
  '''\.next''',
  '''\.turbo''',
  '''coverage''',
  '''tests/fixtures''',
  '''__tests__''',
  '''\.test\.''',
  '''\.spec\.''',
  '''\.env\.example''',
  '''\.env\.template''',
  '''docs/''',
  '''.*\.md$''',
  '''_bmad/''',
  '''\.bmad/''',
  '''basis-core/''',
  '''packages/security/src/dlp''',
  '''packages/.*/dist''',
  '''apps/.*/\.next''',
  '''archive/'''
]

regexes = [
  '''EXAMPLE_.*''',
  '''TEST_.*''',
  '''MOCK_.*''',
  '''PLACEHOLDER_.*''',
  '''your-.*-here''',
  '''sk-test-.*''',
  '''pk-test-.*'''
]

# Custom rules for Vorion-specific patterns
[[rules]]
id = "vorion-api-key"
description = "Vorion API Key"
regex = '''(?i)vorion[_-]?api[_-]?key\s*[=:]\s*['"]?[a-zA-Z0-9]{32,}['"]?'''
tags = ["key", "vorion"]

[[rules]]
id = "agentanchor-token"
description = "AgentAnchor Token"
regex = '''(?i)agentanchor[_-]?token\s*[=:]\s*['"]?[a-zA-Z0-9]{32,}['"]?'''
tags = ["token", "agentanchor"]

[[rules]]
id = "basis-key"
description = "BASIS Key"
regex = '''(?i)basis[_-]?key\s*[=:]\s*['"]?[a-zA-Z0-9]{32,}['"]?'''
tags = ["key", "basis"]

[[rules]]
id = "atsf-secret"
description = "ATSF Secret"
regex = '''(?i)atsf[_-]?secret\s*[=:]\s*['"]?[a-zA-Z0-9]{32,}['"]?'''
tags = ["secret", "atsf"]

[[rules]]
id = "ethereum-private-key"
description = "Ethereum Private Key"
regex = '''(?i)(ethereum|eth)[_-]?private[_-]?key\s*[=:]\s*['"]?0x[a-fA-F0-9]{64}['"]?'''
tags = ["key", "ethereum", "crypto"]

[[rules]]
id = "database-url-with-password"
description = "Database URL with embedded password"
regex = '''(?i)(postgres|mysql|mongodb)://[^:]+:[^@]+@[^/]+/'''
tags = ["database", "password"]
