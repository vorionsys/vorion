# Fly.io config for cognigate-api (run from monorepo root)
# Deploy: fly deploy --config fly.cognigate-api.toml

app = 'cognigate-api'
primary_region = 'iad'

[build]
  dockerfile = 'apps/cognigate-api/Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  SQLITE_PATH = '/data/cognigate.db'

[[mounts]]
  source = 'cognigate_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
