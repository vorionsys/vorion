codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

flags:
  packages:
    paths:
      - packages/
    carryforward: true
  apps:
    paths:
      - apps/
    carryforward: true

ignore:
  - "archive/"
  - "deploy/"
  - "docs/"
  - "kaizen-docs/"
  - "scripts/"
  - "**/dist/"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/fixtures/"
