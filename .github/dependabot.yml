version: 2
updates:
  # NPM dependencies - Security updates only
  # Only allow production dependency updates to reduce noise
  - package-ecosystem: npm
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    allow:
      - dependency-type: production
    groups:
      production-minor-patch:
        dependency-types:
          - production
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10
    reviewers:
      - "dependabot-triage"
    commit-message:
      prefix: "chore(deps):"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci):"
      include: scope

  # Python dependencies for car-cli
  - package-ecosystem: pip
    directory: "/packages/car-python/"
    target-branch: main
    schedule:
      interval: monthly
      day: first
      time: "03:30"
    open-pull-requests-limit: 10
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps-python):"
      include: scope
