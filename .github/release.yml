# =============================================================================
# GitHub Release Notes Configuration
# =============================================================================
# Controls how GitHub's built-in release notes generator categorizes PRs.
# Used by `gh release create --generate-notes` and the Releases UI.
#
# Maps conventional commit prefixes in PR titles to changelog categories.
# PRs with the `skip-changelog` label are excluded entirely.
# =============================================================================

changelog:
  exclude:
    labels:
      - skip-changelog

  categories:
    - title: "Features"
      labels:
        - feat
    - title: "Bug Fixes"
      labels:
        - fix
    - title: "Documentation"
      labels:
        - docs
    - title: "Performance"
      labels:
        - perf
    - title: "Testing"
      labels:
        - test
    - title: "Infrastructure"
      labels:
        - ci
        - build
        - chore
    - title: "Other Changes"
      labels:
        - "*"
