# =============================================================================
# Publish - npm Package Release
# =============================================================================
# Triggered when a version tag (v*) is pushed to the repository.
# Builds all packages, then publishes every package that has
# publishConfig.access: "public" in its package.json to the npm registry.
#
# Packages published:
#   @vorionsys/basis, @vorionsys/atsf-core, @vorionsys/contracts,
#   @vorionsys/sdk, @vorionsys/cognigate, @vorionsys/car-cli,
#   @vorionsys/car-client, @vorionsys/runtime,
#   @vorionsys/proof-plane, @vorionsys/shared-constants, @vorionsys/council,
#   @vorionsys/ai-gateway
#
# Required secrets:
#   NPM_TOKEN - npm automation token with publish permissions
# =============================================================================

name: Publish to npm

on:
  push:
    tags:
      - "v*"

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: npm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node20-

      - name: Cache Turbo build artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-publish-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-publish-
            turbo-${{ runner.os }}-node20-

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Verify tag matches root version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::warning::Tag version ($TAG_VERSION) does not match root package.json version ($PKG_VERSION). Publishing individual package versions as-is."
          fi

      - name: Publish packages with public access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e

          # List of packages that declare publishConfig.access: "public"
          PACKAGES=(
            "packages/contracts"
            "packages/shared-constants"
            "packages/basis"
            "packages/atsf-core"
            "packages/proof-plane"
            "packages/runtime"
            "packages/cognigate"
            "packages/car-client"
            "packages/car-cli"
            "packages/sdk"
            "packages/council"
            "packages/ai-gateway"
          )

          PUBLISHED=0
          SKIPPED=0
          FAILED=0

          for pkg in "${PACKAGES[@]}"; do
            PKG_NAME=$(node -p "require('./$pkg/package.json').name")
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            ACCESS=$(node -p "try { require('./$pkg/package.json').publishConfig.access } catch(e) { 'none' }")

            if [ "$ACCESS" != "public" ]; then
              echo "::notice::Skipping $PKG_NAME - no publishConfig.access: public"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Check if this exact version is already published
            if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
              echo "::notice::$PKG_NAME@$PKG_VERSION already published, skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "Publishing $PKG_NAME@$PKG_VERSION..."
            if (cd "$pkg" && npm publish --access public --provenance); then
              echo "::notice::Published $PKG_NAME@$PKG_VERSION"
              PUBLISHED=$((PUBLISHED + 1))
            else
              echo "::error::Failed to publish $PKG_NAME@$PKG_VERSION"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=============================="
          echo "Publish Summary"
          echo "=============================="
          echo "Published: $PUBLISHED"
          echo "Skipped:   $SKIPPED"
          echo "Failed:    $FAILED"
          echo "=============================="

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED package(s) failed to publish"
            exit 1
          fi
