name: Secrets Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Scan mode'
        required: false
        default: 'protect'
        type: choice
        options:
          - protect
          - detect

jobs:
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Non-blocking until GITLEAKS_LICENSE org secret is provisioned
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
        continue-on-error: true

  pattern-check:
    name: Pattern-based Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for common secret patterns
        run: |
          echo "Checking for potential secrets..."

          # Check for hardcoded API keys (excluding test files and examples)
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
             -E "(api[_-]?key|secret[_-]?key|access[_-]?token)\s*[:=]\s*['\"][a-zA-Z0-9]{20,}['\"]" \
             --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.next \
             --exclude="*.test.ts" --exclude="*.spec.ts" --exclude="*.example.*" \
             . 2>/dev/null; then
            echo "::warning::Potential hardcoded secrets found. Please review."
          fi

          # Check for .env files that shouldn't be committed
          if find . -name ".env" -not -path "./node_modules/*" -not -name ".env.example" -not -name ".env.template" | grep -q .; then
            echo "::error::Found .env files that may contain secrets"
            find . -name ".env" -not -path "./node_modules/*" -not -name ".env.example" -not -name ".env.template"
            exit 1
          fi

          echo "Pattern check complete"
