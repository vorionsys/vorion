# =============================================================================
# Vorion SBOM Generation Pipeline
# Generates CycloneDX 1.5 + SPDX SBOMs for the TypeScript monorepo
# Correlates npm audit vulnerabilities, archives history, uploads to releases
# =============================================================================

name: SBOM Generation

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for SBOM (e.g., v1.0.0)'
        required: false
        type: string
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6AM UTC

env:
  NODE_VERSION: '20'

permissions:
  contents: write
  security-events: write

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Job 1: Generate SBOM in CycloneDX and SPDX formats
  # ===========================================================================
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sbom-cyclonedx-json: ${{ steps.artifacts.outputs.sbom-cyclonedx-json }}
      sbom-cyclonedx-xml: ${{ steps.artifacts.outputs.sbom-cyclonedx-xml }}
      sbom-spdx-json: ${{ steps.artifacts.outputs.sbom-spdx-json }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            VERSION="weekly-$(date +%Y%m%d)"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice ::SBOM version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci --legacy-peer-deps

      - name: Install SBOM tooling
        run: |
          npm install -g @cyclonedx/cyclonedx-npm@latest
          npm install -g spdx-sbom-generator@latest 2>/dev/null || true

      - name: Create output directories
        run: |
          mkdir -p sbom
          mkdir -p sbom-history

      # -----------------------------------------------------------------------
      # CycloneDX Generation
      # -----------------------------------------------------------------------
      - name: Generate CycloneDX SBOM (JSON)
        run: |
          cyclonedx-npm \
            --output-format JSON \
            --spec-version 1.5 \
            --output-reproducible \
            --output-file sbom/sbom-cyclonedx.json
          echo "CycloneDX JSON generated: $(jq '.components | length' sbom/sbom-cyclonedx.json) components"

      - name: Generate CycloneDX SBOM (XML)
        run: |
          cyclonedx-npm \
            --output-format XML \
            --spec-version 1.5 \
            --output-reproducible \
            --output-file sbom/sbom-cyclonedx.xml
          echo "CycloneDX XML generated"

      # -----------------------------------------------------------------------
      # SPDX Generation
      # -----------------------------------------------------------------------
      - name: Generate SPDX SBOM (JSON)
        run: |
          # Use npx to generate SPDX from package-lock.json
          # Fall back to manual generation if spdx-sbom-generator is unavailable
          if command -v spdx-sbom-generator &>/dev/null; then
            spdx-sbom-generator -o sbom/ -f json
            mv sbom/*.spdx.json sbom/sbom-spdx.json 2>/dev/null || true
          fi

          # If the tool did not produce output, generate SPDX manually from CycloneDX
          if [ ! -f sbom/sbom-spdx.json ]; then
            node --input-type=module << 'SPDX_EOF'
          import { readFileSync, writeFileSync } from 'fs';
          import { randomUUID } from 'crypto';

          const cdx = JSON.parse(readFileSync('sbom/sbom-cyclonedx.json', 'utf-8'));
          const now = new Date().toISOString();
          const docNamespace = `https://vorion.org/spdx/${randomUUID()}`;

          const spdx = {
            spdxVersion: "SPDX-2.3",
            dataLicense: "CC0-1.0",
            SPDXID: "SPDXRef-DOCUMENT",
            name: cdx.metadata?.component?.name || "@vorion/platform",
            documentNamespace: docNamespace,
            creationInfo: {
              created: now,
              creators: [
                "Tool: vorion-sbom-pipeline",
                "Organization: Vorion, Inc."
              ],
              licenseListVersion: "3.22"
            },
            packages: (cdx.components || []).map((comp, idx) => ({
              SPDXID: `SPDXRef-Package-${idx}`,
              name: comp.name,
              versionInfo: comp.version || "NOASSERTION",
              supplier: comp.author || comp.publisher || "NOASSERTION",
              downloadLocation: comp.purl
                ? `https://registry.npmjs.org/${comp.name}/-/${comp.name.split('/').pop()}-${comp.version}.tgz`
                : "NOASSERTION",
              filesAnalyzed: false,
              licenseConcluded: (comp.licenses && comp.licenses[0]?.license?.id) || "NOASSERTION",
              licenseDeclared: (comp.licenses && comp.licenses[0]?.license?.id) || "NOASSERTION",
              copyrightText: "NOASSERTION",
              externalRefs: comp.purl ? [{
                referenceCategory: "PACKAGE-MANAGER",
                referenceType: "purl",
                referenceLocator: comp.purl
              }] : [],
              checksums: (comp.hashes || []).map(h => ({
                algorithm: h.alg === "SHA-256" ? "SHA256" : h.alg,
                checksumValue: h.content
              }))
            })),
            relationships: (cdx.dependencies || []).flatMap(dep =>
              (dep.dependsOn || []).map(child => ({
                spdxElementId: `SPDXRef-DOCUMENT`,
                relatedSpdxElement: `SPDXRef-Package-${(cdx.components || []).findIndex(c => c['bom-ref'] === child)}`,
                relationshipType: "DEPENDS_ON"
              }))
            ).filter(r => !r.relatedSpdxElement.endsWith('-1'))
          };

          writeFileSync('sbom/sbom-spdx.json', JSON.stringify(spdx, null, 2));
          console.log(`SPDX 2.3 JSON generated: ${spdx.packages.length} packages`);
          SPDX_EOF
          fi

      # -----------------------------------------------------------------------
      # Vulnerability Correlation
      # -----------------------------------------------------------------------
      - name: Run npm audit and correlate with SBOM
        run: |
          npm audit --json > sbom/audit-report.json 2>/dev/null || true

          node --input-type=module << 'VULN_EOF'
          import { readFileSync, writeFileSync, existsSync } from 'fs';

          const sbomPath = 'sbom/sbom-cyclonedx.json';
          const auditPath = 'sbom/audit-report.json';

          if (!existsSync(auditPath)) {
            console.log('No audit report found, skipping vulnerability correlation');
            process.exit(0);
          }

          try {
            const sbom = JSON.parse(readFileSync(sbomPath, 'utf-8'));
            const audit = JSON.parse(readFileSync(auditPath, 'utf-8'));

            const vulnerabilities = [];
            const componentRefs = new Map();

            for (const comp of sbom.components || []) {
              componentRefs.set(comp.name, comp['bom-ref'] || `${comp.name}@${comp.version}`);
            }

            if (audit.vulnerabilities) {
              for (const [pkgName, vuln] of Object.entries(audit.vulnerabilities)) {
                for (const via of vuln.via || []) {
                  if (typeof via === 'object' && via.source) {
                    vulnerabilities.push({
                      id: `NPM-${via.source}`,
                      source: {
                        name: 'npm',
                        url: via.url || 'https://www.npmjs.com/advisories'
                      },
                      ratings: [{
                        severity: (via.severity || vuln.severity || 'unknown').toLowerCase(),
                        method: 'CVSSv3'
                      }],
                      description: via.title || 'Unknown vulnerability',
                      recommendation: typeof vuln.fixAvailable === 'object'
                        ? `Upgrade to ${vuln.fixAvailable.name}@${vuln.fixAvailable.version}`
                        : (vuln.fixAvailable ? 'Fix available' : 'No fix available'),
                      affects: [{
                        ref: componentRefs.get(pkgName) || pkgName,
                        versions: [{
                          version: via.range || vuln.range || '*',
                          status: 'affected'
                        }]
                      }]
                    });
                  }
                }
              }
            }

            if (vulnerabilities.length > 0) {
              sbom.vulnerabilities = vulnerabilities;
              writeFileSync(sbomPath, JSON.stringify(sbom, null, 2));
              console.log(`Added ${vulnerabilities.length} vulnerabilities to CycloneDX SBOM`);
            } else {
              console.log('No vulnerabilities found to add');
            }

            // Write standalone vulnerability summary
            const summary = {
              generated: new Date().toISOString(),
              total: vulnerabilities.length,
              bySeverity: {},
              details: vulnerabilities.map(v => ({
                id: v.id,
                severity: v.ratings[0]?.severity,
                description: v.description,
                package: v.affects[0]?.ref,
                recommendation: v.recommendation
              }))
            };
            for (const v of vulnerabilities) {
              const sev = v.ratings[0]?.severity || 'unknown';
              summary.bySeverity[sev] = (summary.bySeverity[sev] || 0) + 1;
            }
            writeFileSync('sbom/vulnerability-summary.json', JSON.stringify(summary, null, 2));
          } catch (error) {
            console.warn('Warning: Could not process audit data:', error.message);
          }
          VULN_EOF

      # -----------------------------------------------------------------------
      # Container Digest + Runtime Environment Hash
      # -----------------------------------------------------------------------
      - name: Generate container digest
        if: hashFiles('Dockerfile') != ''
        run: |
          # Generate a digest of the Dockerfile and build context for traceability
          DOCKERFILE_HASH=$(sha256sum Dockerfile | awk '{print $1}')
          echo "{\"dockerfile_sha256\": \"${DOCKERFILE_HASH}\", \"generated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > sbom/container-digest.json
          echo "Dockerfile SHA-256: ${DOCKERFILE_HASH}"

      - name: Generate runtime environment hash
        run: |
          node --input-type=module << 'ENV_EOF'
          import { writeFileSync } from 'fs';
          import { execSync } from 'child_process';
          import { createHash } from 'crypto';

          const env = {
            generated: new Date().toISOString(),
            node: {
              version: process.version,
              platform: process.platform,
              arch: process.arch
            },
            npm: {
              version: execSync('npm --version', { encoding: 'utf-8' }).trim()
            },
            os: {
              type: execSync('uname -s', { encoding: 'utf-8' }).trim(),
              release: execSync('uname -r', { encoding: 'utf-8' }).trim()
            }
          };

          const envHash = createHash('sha256')
            .update(JSON.stringify(env))
            .digest('hex');

          env.environmentHash = envHash;
          writeFileSync('sbom/runtime-environment.json', JSON.stringify(env, null, 2));
          console.log(`Runtime environment hash: ${envHash}`);
          ENV_EOF

      # -----------------------------------------------------------------------
      # Archive and Version
      # -----------------------------------------------------------------------
      - name: Create versioned SBOM copies and archive to sbom-history
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP=$(date +%Y-%m-%d)
          PREFIX="sbom-v${VERSION}-${TIMESTAMP}"

          # Create versioned copies in sbom/
          cp sbom/sbom-cyclonedx.json "sbom/${PREFIX}-cyclonedx.json"
          cp sbom/sbom-cyclonedx.xml  "sbom/${PREFIX}-cyclonedx.xml"
          cp sbom/sbom-spdx.json      "sbom/${PREFIX}-spdx.json"

          # Archive to sbom-history/
          cp "sbom/${PREFIX}-cyclonedx.json" sbom-history/
          cp "sbom/${PREFIX}-cyclonedx.xml"  sbom-history/
          cp "sbom/${PREFIX}-spdx.json"      sbom-history/

          # Set outputs for downstream jobs
          echo "sbom-cyclonedx-json=${PREFIX}-cyclonedx.json" >> "$GITHUB_OUTPUT"
          echo "sbom-cyclonedx-xml=${PREFIX}-cyclonedx.xml"   >> "$GITHUB_OUTPUT"
          echo "sbom-spdx-json=${PREFIX}-spdx.json"           >> "$GITHUB_OUTPUT"

          # Generate step summary
          COMPONENT_COUNT=$(jq '.components | length' sbom/sbom-cyclonedx.json)
          VULN_COUNT=$(jq '.vulnerabilities // [] | length' sbom/sbom-cyclonedx.json)
          SPDX_PKG_COUNT=$(jq '.packages | length' sbom/sbom-spdx.json)

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## SBOM Generation Summary

          | Field | Value |
          |-------|-------|
          | **Version** | ${VERSION} |
          | **Date** | ${TIMESTAMP} |
          | **CycloneDX Spec** | 1.5 |
          | **SPDX Spec** | 2.3 |
          | **Components (CycloneDX)** | ${COMPONENT_COUNT} |
          | **Packages (SPDX)** | ${SPDX_PKG_COUNT} |
          | **Vulnerabilities** | ${VULN_COUNT} |

          ### Artifacts
          - \`${PREFIX}-cyclonedx.json\`
          - \`${PREFIX}-cyclonedx.xml\`
          - \`${PREFIX}-spdx.json\`
          - \`vulnerability-summary.json\`
          - \`runtime-environment.json\`
          SUMMARY

      # -----------------------------------------------------------------------
      # Validate SBOM (NTIA Minimum Elements)
      # -----------------------------------------------------------------------
      - name: Validate SBOM against NTIA minimum elements
        run: |
          node --input-type=module << 'VALIDATE_EOF'
          import { readFileSync } from 'fs';

          const sbom = JSON.parse(readFileSync('sbom/sbom-cyclonedx.json', 'utf-8'));
          const checks = [];
          let passed = 0;
          let failed = 0;

          function check(name, condition, detail) {
            const status = condition ? 'PASS' : 'FAIL';
            if (condition) passed++; else failed++;
            checks.push({ name, status, detail });
            console.log(`  [${status}] ${name}${detail ? ': ' + detail : ''}`);
          }

          console.log('\n=== NTIA Minimum Elements Validation ===\n');

          // 1. Supplier Name
          const supplier = sbom.metadata?.component?.author ||
                           sbom.metadata?.component?.publisher ||
                           sbom.metadata?.manufacture?.name;
          check('Supplier Name', !!sbom.metadata?.component, `Component: ${sbom.metadata?.component?.name}`);

          // 2. Component Name
          check('Component Name', !!sbom.metadata?.component?.name, sbom.metadata?.component?.name);

          // 3. Version
          check('Component Version', !!sbom.metadata?.component?.version, sbom.metadata?.component?.version);

          // 4. Unique Identifiers (purl or bom-ref on components)
          const hasIdentifiers = (sbom.components || []).some(c => c.purl || c['bom-ref']);
          check('Unique Identifiers (purl/bom-ref)', hasIdentifiers,
            `${(sbom.components || []).filter(c => c.purl).length} components with purl`);

          // 5. Dependency Relationships
          const hasDeps = Array.isArray(sbom.dependencies) && sbom.dependencies.length > 0;
          check('Dependency Relationships', hasDeps,
            `${(sbom.dependencies || []).length} dependency entries`);

          // 6. Author of SBOM Data
          const hasAuthor = sbom.metadata?.tools && sbom.metadata.tools.length > 0;
          check('Author of SBOM Data (tools)', hasAuthor,
            `${(sbom.metadata?.tools || []).length} tools listed`);

          // 7. Timestamp
          check('Timestamp', !!sbom.metadata?.timestamp, sbom.metadata?.timestamp);

          // 8. bomFormat
          check('BOM Format', sbom.bomFormat === 'CycloneDX', sbom.bomFormat);

          // 9. specVersion
          check('Spec Version', !!sbom.specVersion, sbom.specVersion);

          // 10. Serial Number
          check('Serial Number', !!sbom.serialNumber, sbom.serialNumber?.substring(0, 40));

          // 11. Component licenses
          const licensedComps = (sbom.components || []).filter(c =>
            c.licenses && c.licenses.length > 0
          ).length;
          check('Component Licenses', licensedComps > 0,
            `${licensedComps}/${(sbom.components || []).length} components have license data`);

          // 12. Component hashes
          const hashedComps = (sbom.components || []).filter(c =>
            c.hashes && c.hashes.length > 0
          ).length;
          check('Component Hashes', hashedComps > 0,
            `${hashedComps}/${(sbom.components || []).length} components have hash data`);

          console.log(`\n=== Results: ${passed} passed, ${failed} failed out of ${checks.length} checks ===\n`);

          if (failed > 0) {
            console.warn('WARNING: Some NTIA minimum element checks did not pass.');
            console.warn('Review the failures above and ensure compliance before release.');
          }
          VALIDATE_EOF

      # -----------------------------------------------------------------------
      # Upload Artifacts
      # -----------------------------------------------------------------------
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.version.outputs.version }}
          path: |
            sbom/sbom-cyclonedx.json
            sbom/sbom-cyclonedx.xml
            sbom/sbom-spdx.json
            sbom/sbom-v*.json
            sbom/sbom-v*.xml
            sbom/audit-report.json
            sbom/vulnerability-summary.json
            sbom/runtime-environment.json
            sbom/container-digest.json
          retention-days: 90

  # ===========================================================================
  # Job 2: Upload SBOM to GitHub Release
  # ===========================================================================
  upload-to-release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: [generate-sbom]
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.generate-sbom.outputs.version }}
          path: sbom

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom/sbom-cyclonedx.json
            sbom/sbom-cyclonedx.xml
            sbom/sbom-spdx.json
            sbom/${{ needs.generate-sbom.outputs.sbom-cyclonedx-json }}
            sbom/${{ needs.generate-sbom.outputs.sbom-cyclonedx-xml }}
            sbom/${{ needs.generate-sbom.outputs.sbom-spdx-json }}
            sbom/vulnerability-summary.json
          fail_on_unmatched_files: false

  # ===========================================================================
  # Job 3: Dependency Review
  # ===========================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: [generate-sbom]
    if: github.event_name == 'release' || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.generate-sbom.outputs.version }}
          path: sbom

      - name: Upload SBOM to Dependency Graph
        uses: github/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: critical
          allow-ghsas: false

  # ===========================================================================
  # Job 4: Store SBOM History
  # ===========================================================================
  store-sbom-history:
    name: Store SBOM History
    runs-on: ubuntu-latest
    needs: [generate-sbom]
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ needs.generate-sbom.outputs.version }}
          path: sbom-download

      - name: Store versioned SBOM
        run: |
          mkdir -p sbom-history

          cp "sbom-download/${{ needs.generate-sbom.outputs.sbom-cyclonedx-json }}" sbom-history/
          cp "sbom-download/${{ needs.generate-sbom.outputs.sbom-cyclonedx-xml }}" sbom-history/
          cp "sbom-download/${{ needs.generate-sbom.outputs.sbom-spdx-json }}" sbom-history/

          # Update index
          {
            echo "# SBOM History"
            echo ""
            echo "Historical SBOMs for each Vorion release."
            echo ""
            echo "| Version | CycloneDX JSON | CycloneDX XML | SPDX JSON |"
            echo "|---------|---------------|---------------|-----------|"
            for f in sbom-history/*-cyclonedx.json; do
              [ -f "$f" ] || continue
              base=$(basename "$f" -cyclonedx.json)
              echo "| ${base} | [JSON](${base}-cyclonedx.json) | [XML](${base}-cyclonedx.xml) | [SPDX](${base}-spdx.json) |"
            done | sort -r
          } > sbom-history/README.md

      - name: Commit SBOM history
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: add SBOM for version ${{ needs.generate-sbom.outputs.version }}"
          file_pattern: 'sbom-history/*'
          branch: master
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  # ===========================================================================
  # Job 5: Notify
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [generate-sbom, upload-to-release]
    if: always() && github.event_name == 'release'

    steps:
      - name: Report Status
        run: |
          VERSION="${{ needs.generate-sbom.outputs.version }}"

          if [ "${{ needs.generate-sbom.result }}" = "success" ]; then
            echo "::notice ::SBOM generation successful for version ${VERSION}"
          else
            echo "::error ::SBOM generation failed for version ${VERSION}"
            exit 1
          fi

          if [ "${{ needs.upload-to-release.result }}" = "success" ]; then
            echo "::notice ::SBOM uploaded to release successfully"
          else
            echo "::warning ::SBOM upload to release may have failed"
          fi
