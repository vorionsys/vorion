              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Vorion WWW Preview\n\nDeployed to: ${{ steps.deploy.outputs.url }}'
            })

  preview-marketing:
    name: Preview Marketing (consolidated landing sites)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy Preview
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/marketing
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Marketing Preview\n\nDeployed to: ${{ steps.deploy.outputs.url }}'
            })

  preview-aurais:
    name: Preview Aurais
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.aurais == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy Preview
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        working-directory: apps/aurais
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_AURAIS_PROJECT_ID }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Aurais Preview\n\nDeployed to: ${{ steps.deploy.outputs.url }}'
            })
