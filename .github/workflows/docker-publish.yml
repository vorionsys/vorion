# =============================================================================
# Docker Publish - vorionsys/vorion Docker Hub Image
# =============================================================================
# Triggered when a version tag (v*) is pushed.
# Builds Dockerfile.lite and pushes vorionsys/vorion:latest + vorionsys/vorion:<tag>
#
# Required secrets:
#   DOCKERHUB_USERNAME - Docker Hub username (vorionsys)
#   DOCKERHUB_TOKEN    - Docker Hub access token (personal access token)
# =============================================================================

name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image version: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vorionsys/vorion
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=Vorion
            org.opencontainers.image.description=Governed AI Execution Platform - Lite Mode
            org.opencontainers.image.vendor=Vorion Risk, LLC
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.lite
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: vorionsys/vorion
          short-description: "Governed AI Execution Platform. BASIS-conformant trust enforcement."
          readme-filepath: ./README.md
        continue-on-error: true
