name: Release SDKs

on:
  push:
    tags:
      - 'car-client-v*'
      - 'car-cli-v*'
      - 'car-python-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - car-client
          - car-cli
          - car-python
          - all
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # =============================================================================
  # Determine what to release
  # =============================================================================

  determine-release:
    name: Determine Release
    runs-on: ubuntu-latest
    outputs:
      release-car-client: ${{ steps.check.outputs.car-client }}
      release-car-cli: ${{ steps.check.outputs.car-cli }}
      release-car-python: ${{ steps.check.outputs.car-python }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Determine packages to release
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PACKAGE="${{ github.event.inputs.package }}"
            VERSION="${{ github.event.inputs.version }}"

            if [[ "$PACKAGE" == "all" ]]; then
              echo "car-client=true" >> $GITHUB_OUTPUT
              echo "car-cli=true" >> $GITHUB_OUTPUT
              echo "car-python=true" >> $GITHUB_OUTPUT
            else
              echo "car-client=$([[ $PACKAGE == 'car-client' ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "car-cli=$([[ $PACKAGE == 'car-cli' ]] && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "car-python=$([[ $PACKAGE == 'car-python' ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == car-client-v* ]]; then
              echo "car-client=true" >> $GITHUB_OUTPUT
              echo "car-cli=false" >> $GITHUB_OUTPUT
              echo "car-python=false" >> $GITHUB_OUTPUT
              echo "version=${TAG#car-client-v}" >> $GITHUB_OUTPUT
            elif [[ "$TAG" == car-cli-v* ]]; then
              echo "car-client=false" >> $GITHUB_OUTPUT
              echo "car-cli=true" >> $GITHUB_OUTPUT
              echo "car-python=false" >> $GITHUB_OUTPUT
              echo "version=${TAG#car-cli-v}" >> $GITHUB_OUTPUT
            elif [[ "$TAG" == car-python-v* ]]; then
              echo "car-client=false" >> $GITHUB_OUTPUT
              echo "car-cli=false" >> $GITHUB_OUTPUT
              echo "car-python=true" >> $GITHUB_OUTPUT
              echo "version=${TAG#car-python-v}" >> $GITHUB_OUTPUT
            fi
          fi

  # =============================================================================
  # Release TypeScript SDK (@vorion/car-client)
  # =============================================================================

  release-car-client:
    name: Release @vorion/car-client
    runs-on: ubuntu-latest
    needs: [determine-release]
    if: needs.determine-release.outputs.release-car-client == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build package
        run: npx turbo build --filter=@vorion/car-client

      - name: Run tests
        run: npx turbo test --filter=@vorion/car-client

      - name: Update version
        if: github.event.inputs.version != ''
        working-directory: packages/car-client
        run: npm version ${{ needs.determine-release.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        working-directory: packages/car-client
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        working-directory: packages/car-client
        run: npm publish --dry-run --access public

      - name: Create GitHub Release
        if: github.event.inputs.dry_run != 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "@vorion/car-client v${{ needs.determine-release.outputs.version }}"
          body: |
            ## @vorion/car-client v${{ needs.determine-release.outputs.version }}

            ### Installation
            ```bash
            npm install @vorion/car-client@${{ needs.determine-release.outputs.version }}
            ```

            ### Links
            - [npm](https://www.npmjs.com/package/@vorion/car-client)
            - [Documentation](https://github.com/vorionsys/vorion/tree/main/packages/car-client)
          generate_release_notes: true

  # =============================================================================
  # Release TypeScript CLI (@vorion/car-cli)
  # =============================================================================

  release-car-cli:
    name: Release @vorion/car-cli
    runs-on: ubuntu-latest
    needs: [determine-release]
    if: needs.determine-release.outputs.release-car-cli == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build dependencies
        run: npx turbo build --filter=@vorion/car-client

      - name: Build CLI
        run: npx turbo build --filter=@vorion/car-cli

      - name: Run tests
        run: npx turbo test --filter=@vorion/car-cli

      - name: Update version
        if: github.event.inputs.version != ''
        working-directory: packages/car-cli
        run: npm version ${{ needs.determine-release.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        working-directory: packages/car-cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (dry run)
        if: github.event.inputs.dry_run == 'true'
        working-directory: packages/car-cli
        run: npm publish --dry-run --access public

  # =============================================================================
  # Release Python SDK (vorion-car)
  # =============================================================================

  release-car-python:
    name: Release vorion-car (Python)
    runs-on: ubuntu-latest
    needs: [determine-release]
    if: needs.determine-release.outputs.release-car-python == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Update version
        if: github.event.inputs.version != ''
        working-directory: packages/car-python
        run: |
          # Update version in pyproject.toml
          sed -i "s/version = \".*\"/version = \"${{ needs.determine-release.outputs.version }}\"/" pyproject.toml
          # Update version in __init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ needs.determine-release.outputs.version }}\"/" vorion_car/__init__.py

      - name: Install package
        working-directory: packages/car-python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/car-python
        run: pytest -v
        continue-on-error: true

      - name: Build package
        working-directory: packages/car-python
        run: python -m build

      - name: Check package
        working-directory: packages/car-python
        run: twine check dist/*

      - name: Publish to PyPI
        if: github.event.inputs.dry_run != 'true'
        working-directory: packages/car-python
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Publish to PyPI (dry run)
        if: github.event.inputs.dry_run == 'true'
        working-directory: packages/car-python
        run: |
          echo "Would publish the following files:"
          ls -la dist/

      - name: Create GitHub Release
        if: github.event.inputs.dry_run != 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "vorion-car v${{ needs.determine-release.outputs.version }}"
          body: |
            ## vorion-car v${{ needs.determine-release.outputs.version }}

            ### Installation
            ```bash
            pip install vorion-car==${{ needs.determine-release.outputs.version }}
            ```

            ### Links
            - [PyPI](https://pypi.org/project/vorion-car/)
            - [Documentation](https://github.com/vorionsys/vorion/tree/main/packages/car-python)
          generate_release_notes: true

  # =============================================================================
  # Post-release notifications
  # =============================================================================

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [determine-release, release-car-client, release-car-cli, release-car-python]
    if: always() && github.event.inputs.dry_run != 'true'
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "SDK Release Complete",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "SDK Release v${{ needs.determine-release.outputs.version }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*@vorion/car-client:*\n${{ needs.release-car-client.result == 'success' && '✅ Published' || (needs.release-car-client.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*@vorion/car-cli:*\n${{ needs.release-car-cli.result == 'success' && '✅ Published' || (needs.release-car-cli.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*vorion-car (Python):*\n${{ needs.release-car-python.result == 'success' && '✅ Published' || (needs.release-car-python.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
