# =============================================================================
# VORION COGNIGATE - MULTI-FRAMEWORK COMPLIANCE CONTROL REGISTRY
# =============================================================================
# Maps every Cognigate capability to controls across 13 regulatory frameworks.
# Vorion builds the BASIS standard -- a universal governance framework for
# AI agent systems. This registry maps to ALL governing bodies simultaneously.
#
# Maintained by: Vorion Compliance Engineering
# Classification: PUBLIC
# =============================================================================

registry:
  metadata:
    version: "1.0.0"
    last_updated: "2026-02-19"
    schema_version: "1.0"
    product: "Cognigate Engine"
    product_version: "0.2.0"
    standard: "BASIS v1.0"
    organization: "Vorion Systems"
    framework_normalization: "./framework-naming.yaml"
    frameworks:
      - id: nist_800_53
        name: "NIST SP 800-53 Rev 5"
        version: "Rev 5"
        jurisdiction: "US Federal"
        scope: "Security and Privacy Controls for Information Systems"
      - id: nist_ai_rmf
        name: "NIST AI RMF 1.0"
        version: "1.0"
        jurisdiction: "US"
        scope: "AI Risk Management Framework"
      - id: nist_800_171
        name: "NIST SP 800-171 Rev 3"
        version: "Rev 3"
        jurisdiction: "US DoD / CUI"
        scope: "Protecting Controlled Unclassified Information"
      - id: eu_ai_act
        name: "EU AI Act"
        version: "2024/1689"
        jurisdiction: "European Union"
        scope: "High-Risk AI Systems (Articles 9-17)"
      - id: iso_42001
        name: "ISO/IEC 42001:2023"
        version: "2023"
        jurisdiction: "International"
        scope: "AI Management System"
      - id: iso_27001
        name: "ISO/IEC 27001:2022"
        version: "2022"
        jurisdiction: "International"
        scope: "Information Security Management System (Annex A)"
      - id: soc2
        name: "SOC 2 Type II"
        version: "2017 (updated 2022)"
        jurisdiction: "US / International"
        scope: "Trust Service Criteria"
      - id: cmmc
        name: "CMMC 2.0 Level 2"
        version: "2.0"
        jurisdiction: "US DoD"
        scope: "Cybersecurity Maturity Model Certification"
      - id: fedramp
        name: "FedRAMP Moderate"
        version: "Moderate Baseline"
        jurisdiction: "US Federal Cloud"
        scope: "Federal Risk and Authorization Management Program"
      - id: gdpr
        name: "GDPR"
        version: "2016/679"
        jurisdiction: "European Union"
        scope: "General Data Protection Regulation"
      - id: singapore_pdpa
        name: "Singapore PDPA"
        version: "2012 (amended 2020)"
        jurisdiction: "Singapore"
        scope: "Personal Data Protection Act"
      - id: japan_appi
        name: "Japan APPI"
        version: "2020 Amendment"
        jurisdiction: "Japan"
        scope: "Act on Protection of Personal Information"
      - id: cosais
        name: "COSAiS"
        version: "Draft 2025"
        jurisdiction: "US (NIST)"
        scope: "Control Overlays for Securing AI Systems"

    trust_tiers:
      - tier: T0
        name: "Sandbox"
        score_range: "0-199"
      - tier: T1
        name: "Observed"
        score_range: "200-349"
      - tier: T2
        name: "Provisional"
        score_range: "350-499"
      - tier: T3
        name: "Monitored"
        score_range: "500-649"
      - tier: T4
        name: "Standard"
        score_range: "650-799"
      - tier: T5
        name: "Trusted"
        score_range: "800-875"
      - tier: T6
        name: "Certified"
        score_range: "876-950"
      - tier: T7
        name: "Autonomous"
        score_range: "951-1000"

  # ===========================================================================
  # INTENT LAYER -- Risk Analysis and Intent Classification
  # ===========================================================================
  components:
    intent_layer:
      description: "Level 1-2 security: deterministic pattern detection, AI-driven risk analysis, adversarial critic evaluation, and goal normalization"
      namespace: "INTENT"

      capabilities:
        # --- Tripwire Detection (Level 1) ---
        - name: "tripwire_detection"
          id: "INTENT.tripwire"
          description: "Deterministic regex-based security pattern detection for 22+ forbidden patterns including filesystem destruction, fork bombs, SQL injection, privilege escalation, reverse shells, credential theft, and remote code execution"
          implementation: "cognigate/app/core/tripwires.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.tripwire_trigger"
          controls:
            nist_800_53:
              - "SI-3"    # Malicious Code Protection
              - "SI-4"    # System Monitoring
              - "SI-4(4)" # Inbound and Outbound Communications Traffic
              - "SI-4(5)" # System-Generated Alerts
              - "SI-10"   # Information Input Validation
              - "SI-10(1)" # Manual Override Capability
              - "RA-5"    # Vulnerability Monitoring and Scanning
              - "SC-7"    # Boundary Protection
              - "SC-7(4)" # External Telecommunications Services
              # SC-44 (Detonation Chambers) removed — not applicable. SC-44 requires
              # sandboxed execution environments for analyzing suspicious code/content.
              # Tripwire detection is deterministic regex pattern matching, not code
              # detonation. The T0 Sandbox trust tier provides capability isolation,
              # not code analysis sandboxing. SC-44 is N/A for Cognigate.
            nist_ai_rmf:
              - "MEASURE 2.6"  # AI system security and resilience evaluation
              - "MEASURE 2.7"  # AI system assessed for cybersecurity risks
              - "MANAGE 1.1"   # Risk treatment plans implemented
              - "MANAGE 2.4"   # Mechanisms for AI system deactivation
              - "MAP 3.5"      # Potential AI system risks identified
            nist_800_171:
              - "3.14.1"  # Monitor organizational systems
              - "3.14.2"  # Provide protection from malicious code
              - "3.14.6"  # Monitor organizational systems to detect attacks
              - "3.14.7"  # Identify unauthorized use
            eu_ai_act:
              - "Article 9(2)(a)"  # Risk management - identification of known/foreseeable risks
              - "Article 9(4)(d)"  # Risks from intended purpose and foreseeable misuse
              - "Article 15(1)"    # Accuracy, robustness and cybersecurity
              - "Article 15(4)"    # Resilience to attempts by unauthorized third parties
            iso_42001:
              - "A.6.2.6"  # AI system security
              - "A.6.2.7"  # Protection against adversarial attacks
              - "A.10.3"   # Monitoring and measurement of AI system performance
              - "6.1.2"    # Information security risk assessment
            iso_27001:
              - "A.8.7"   # Protection against malware
              - "A.8.16"  # Monitoring activities
              - "A.8.23"  # Web filtering
              - "A.8.26"  # Application security requirements
            soc2:
              - "CC6.1"   # Logical and physical access controls
              - "CC6.6"   # Restriction of access to system components
              - "CC6.8"   # Prevention/detection of unauthorized software
              - "CC7.1"   # Detection and monitoring of new vulnerabilities
              - "CC7.2"   # Security event monitoring
            cmmc:
              - "SI.L2-3.14.1"  # Flaw remediation
              - "SI.L2-3.14.2"  # Malicious code protection
              - "SI.L2-3.14.6"  # Monitor communications for attacks
              - "SI.L2-3.14.7"  # Identify unauthorized use
            fedramp:
              - "SI-3"    # Malicious Code Protection
              - "SI-4"    # Information System Monitoring
              - "SI-10"   # Information Input Validation
              - "RA-5"    # Vulnerability Scanning (enhanced)
            gdpr:
              - "Article 32(1)(b)"  # Ensure ongoing confidentiality and integrity
              - "Article 32(1)(d)"  # Regular testing/assessing/evaluating effectiveness
              - "Article 25(1)"     # Data protection by design
            singapore_pdpa:
              - "Section 24"  # Protection of personal data
              - "Section 24(a)" # Reasonable security arrangements
            japan_appi:
              - "Article 23"  # Security control measures
              - "Article 23(1)" # Necessary and appropriate measures for security
            cosais:
              - "AIS-SC.01"  # Input validation for AI systems
              - "AIS-SC.02"  # Adversarial input detection
              - "AIS-IR.01"  # AI-specific incident detection

        # --- AI Critic (Level 2) ---
        - name: "ai_critic_evaluation"
          id: "INTENT.critic"
          description: "Adversarial AI evaluation using multi-provider LLM analysis (Anthropic, OpenAI, Google, xAI) to detect hidden risks, euphemisms, unsafe tool combinations, and escalation triggers. Implements planner-critic pattern with judgment scale: safe/suspicious/dangerous/block"
          implementation: "cognigate/app/core/critic.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.critic_verdict"
          controls:
            nist_800_53:
              - "CA-8"    # Penetration Testing
              - "CA-8(1)" # Independent Penetration Testing Agent
              - "RA-3"    # Risk Assessment
              - "RA-3(1)" # Supply Chain Risk Assessment
              - "RA-5"    # Vulnerability Monitoring and Scanning
              - "SI-4"    # System Monitoring
              - "SI-4(2)" # Automated Tools for Real-Time Analysis
              - "SA-11"   # Developer Testing and Evaluation
              - "SA-11(5)" # Penetration Testing
            nist_ai_rmf:
              - "MEASURE 2.6"  # AI system assessed for security
              - "MEASURE 2.7"  # Cybersecurity risk assessment
              - "MEASURE 2.11" # Fairness and bias evaluated
              - "MANAGE 1.3"   # Responses to identified AI risks
              - "MAP 2.3"      # Scientific integrity and TEVV
              - "GOVERN 1.7"   # Processes for AI system testing
            nist_800_171:
              - "3.11.1"  # Periodically assess risk
              - "3.11.2"  # Scan for vulnerabilities
              - "3.12.3"  # Monitor security controls on ongoing basis
            eu_ai_act:
              - "Article 9(2)(b)"  # Estimation and evaluation of risks
              - "Article 9(6)"     # Testing for high-risk AI systems
              - "Article 9(7)"     # Testing procedures appropriate to purpose
              - "Article 15(2)"    # Metrics to measure accuracy/robustness
              - "Article 15(3)"    # Resilience regarding errors/faults/inconsistencies
            iso_42001:
              - "A.6.2.4"  # AI system verification and validation
              - "A.6.2.7"  # Protection against adversarial attacks
              - "A.8.4"    # Documentation of AI system testing
              - "9.1"      # Monitoring, measurement, analysis and evaluation
            iso_27001:
              - "A.8.8"   # Management of technical vulnerabilities
              - "A.8.25"  # Secure development lifecycle
              - "A.8.29"  # Security testing in development and acceptance
              - "A.8.34"  # Protection of information during audit testing
            soc2:
              - "CC4.1"   # Design and operating effectiveness of controls
              - "CC4.2"   # Evaluation and communication of deficiencies
              - "CC7.1"   # Detection of new vulnerabilities
              - "CC7.2"   # Security event monitoring and anomaly detection
            cmmc:
              - "CA.L2-3.12.1"  # Security assessments
              - "CA.L2-3.12.3"  # Monitor security controls
              - "RA.L2-3.11.1"  # Risk assessments
              - "RA.L2-3.11.2"  # Vulnerability scanning
            fedramp:
              - "CA-8"    # Penetration Testing
              - "RA-3"    # Risk Assessment
              - "RA-5"    # Vulnerability Scanning
              - "SA-11"   # Developer Security Testing
            gdpr:
              - "Article 35(1)"   # Data protection impact assessment
              - "Article 35(7)(c)" # Assessment of risks to rights/freedoms
              - "Article 32(1)(d)" # Regular testing and assessing
            singapore_pdpa:
              - "Section 24"    # Protection of personal data
              - "Section 11(3)" # Accountability obligation
            japan_appi:
              - "Article 23"   # Security control measures
              - "Article 26-2" # Report to PPC on data breaches
            cosais:
              - "AIS-RA.01"  # AI-specific risk assessment
              - "AIS-RA.02"  # Adversarial testing for AI systems
              - "AIS-SC.03"  # Red-teaming for AI models

        # --- Risk Scoring ---
        - name: "risk_scoring"
          id: "INTENT.risk_score"
          description: "Multi-dimensional risk scoring (0.0-1.0) with risk indicators by category including data_exposure, tool_danger, scope_creep, and escalation potential. Structured plan generation with tools_required, data_classifications, and reasoning_trace"
          implementation: "cognigate/app/models/intent.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.risk_assessment"
          controls:
            nist_800_53:
              - "RA-3"    # Risk Assessment
              - "RA-3(4)" # Predictive Cyber Analytics
              - "RA-7"    # Risk Response
              - "PM-9"    # Risk Management Strategy
              - "PM-28"   # Risk Framing
            nist_ai_rmf:
              - "MAP 1.1"     # Intended purposes and context of use
              - "MAP 1.5"     # Risk tolerance identified
              - "MAP 3.5"     # Potential risks identified
              - "MEASURE 1.1" # AI risk metrics identified
              - "MEASURE 2.1" # AI system tested for performance
              - "GOVERN 1.1"  # Legal and regulatory requirements identified
            nist_800_171:
              - "3.11.1"  # Periodically assess risk
              - "3.11.3"  # Remediate vulnerabilities per risk assessments
            eu_ai_act:
              - "Article 9(1)"   # Risk management system established
              - "Article 9(2)"   # Identification and analysis of known risks
              - "Article 9(2)(c)" # Evaluation of possible risks from data
              - "Article 9(4)"   # Measures to eliminate/reduce risks
            iso_42001:
              - "6.1.1"   # Actions to address risks and opportunities
              - "6.1.2"   # AI risk assessment
              - "A.5.4"   # AI risk assessment processes
              - "A.5.5"   # AI risk treatment
            iso_27001:
              - "6.1.2"   # Information security risk assessment
              - "6.1.3"   # Information security risk treatment
              - "A.5.7"   # Threat intelligence
            soc2:
              - "CC3.1"   # Risk identification and assessment
              - "CC3.2"   # Risk estimation
              - "CC3.4"   # Risk mitigation activities
              - "CC5.1"   # Selection and development of controls
            cmmc:
              - "RA.L2-3.11.1"  # Risk assessments
              - "RA.L2-3.11.3"  # Vulnerability remediation
            fedramp:
              - "RA-3"    # Risk Assessment (enhanced continuous)
              - "RA-7"    # Risk Response
              - "PM-9"    # Risk Management Strategy
            gdpr:
              - "Article 35(1)"    # DPIA for high-risk processing
              - "Article 35(7)(b)" # Assessment of necessity and proportionality
              - "Article 35(7)(c)" # Assessment of risks
            singapore_pdpa:
              - "Section 24"  # Protection of personal data (risk-based)
            japan_appi:
              - "Article 23"  # Security control measures (risk-based)
            cosais:
              - "AIS-RA.01"  # AI-specific risk assessment methodology
              - "AIS-RA.03"  # Continuous AI risk monitoring

        # --- Goal Classification / Structured Planning ---
        - name: "goal_classification"
          id: "INTENT.plan"
          description: "Normalizes raw goals into structured plans with tool requirements, endpoint access, data classifications, and risk indicators. Produces StructuredPlan with plan_id, tools_required, endpoints_required, data_classifications, and reasoning_trace"
          implementation: "cognigate/app/routers/intent.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.intent_normalized"
          controls:
            nist_800_53:
              - "SA-8(2)"  # Least Privilege Design Principle
              - "SA-8(3)"  # Least Functionality Design Principle
              - "AC-6"     # Least Privilege
              - "CM-7"     # Least Functionality
              - "PL-8"     # Security and Privacy Architectures
            nist_ai_rmf:
              - "MAP 1.1"     # Intended purposes described
              - "MAP 1.6"     # System requirements documented
              - "MAP 2.1"     # AI tasks and methods documented
              - "GOVERN 1.4"  # AI system purpose documented
              - "MEASURE 2.5" # AI system outputs assessed
            nist_800_171:
              - "3.1.5"   # Least privilege
              - "3.4.6"   # Least functionality
              - "3.4.8"   # Apply deny-by-exception policy
            eu_ai_act:
              - "Article 11(1)"  # Technical documentation before placing on market
              - "Article 12(1)"  # Automatic recording of events (logs)
              - "Article 13(1)"  # Transparency and provision of information
              - "Article 13(2)"  # AI system operation transparency
            iso_42001:
              - "A.6.1.2"  # AI system lifecycle processes
              - "A.6.2.2"  # AI system design
              - "A.7.2"    # AI system documentation
              - "A.10.2"   # AI system performance objectives
            iso_27001:
              - "A.5.10"  # Acceptable use of information
              - "A.5.12"  # Classification of information
              - "A.5.13"  # Labeling of information
              - "A.8.9"   # Configuration management
            soc2:
              - "CC5.2"   # Relevant policies and procedures
              - "CC6.3"   # Authorization of information system access
              - "CC6.1"   # Logical access security
            cmmc:
              - "AC.L2-3.1.5"  # Least privilege
              - "CM.L2-3.4.6"  # Least functionality
              - "CM.L2-3.4.8"  # Deny-by-exception
            fedramp:
              - "AC-6"    # Least Privilege
              - "CM-7"    # Least Functionality
              - "PL-8"    # Security Architecture
            gdpr:
              - "Article 25(1)"  # Data protection by design
              - "Article 25(2)"  # Data protection by default (data minimization)
              - "Article 5(1)(c)" # Data minimisation principle
            singapore_pdpa:
              - "Section 18"  # Limitation of purpose
              - "Section 20"  # Accuracy obligation
            japan_appi:
              - "Article 17"  # Specifying purposes of utilization
              - "Article 18"  # Restriction on utilization purposes
            cosais:
              - "AIS-MP.01"  # AI system purpose documentation
              - "AIS-MP.02"  # AI input/output specification

        # --- Paranoia Mode ---
        - name: "paranoia_mode"
          id: "INTENT.paranoia"
          description: "Elevated security analysis mode that assumes bad intent by default. Critic system prompt enforces adversarial analysis posture: look for euphemisms, scope creep, dangerous tool combinations, and worst-case interpretation"
          implementation: "cognigate/app/core/critic.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.paranoia_engaged"
          controls:
            nist_800_53:
              - "SI-4(13)" # Analyze Communications Traffic Anomalies
              - "RA-3(1)"  # Supply Chain Risk Assessment
              - "SA-15(4)" # Threat Modeling
              - "CA-8(2)"  # Red Team Exercises
            nist_ai_rmf:
              - "MEASURE 2.6"  # Security and resilience evaluation
              - "MEASURE 2.7"  # Cybersecurity risk assessment
              - "MANAGE 2.2"   # AI risk tolerance reassessment
            nist_800_171:
              - "3.14.6"  # Monitor for attacks and indicators
              - "3.14.7"  # Identify unauthorized use
            eu_ai_act:
              - "Article 15(4)"  # Resilience against unauthorized third parties
              - "Article 9(7)"   # Testing appropriate to intended purpose
            iso_42001:
              - "A.6.2.7"  # Protection against adversarial attacks
              - "A.10.3"   # Monitoring AI system performance
            iso_27001:
              - "A.5.7"   # Threat intelligence
              - "A.8.16"  # Monitoring activities
            soc2:
              - "CC7.2"   # Security event monitoring
              - "CC7.4"   # Incident response
            cmmc:
              - "SI.L2-3.14.6"  # Monitor for attacks
              - "SI.L2-3.14.7"  # Identify unauthorized use
            fedramp:
