            cosais:
              - "AIS-SC.03"  # Red-teaming and adversarial testing
              - "AIS-SC.04"  # Continuous adversarial monitoring

    # =========================================================================
    # ENFORCE LAYER -- Policy Validation and Gating
    # =========================================================================
    enforce_layer:
      description: "Policy engine, circuit breaker, velocity caps, trust-tier enforcement, rigor modes, capability taxonomy, and entity management"
      namespace: "ENFORCE"

      capabilities:
        # --- Policy Engine ---
        - name: "policy_engine"
          id: "ENFORCE.policy"
          description: "Expression-based policy evaluation engine supporting comparisons, membership tests, boolean logic, and functions (any, all, contains). Evaluates constraints with severity levels (critical/high/medium/low) and produces violations with remediation guidance. Supports YAML/JSON policy loading and default BASIS policies"
          implementation: "cognigate/app/core/policy_engine.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.policy_evaluation"
          controls:
            nist_800_53:
              - "AC-1"    # Policy and Procedures
              - "AC-3"    # Access Enforcement
              - "AC-3(7)" # Role-Based Access Control
              - "AC-3(8)" # Revocation of Access Authorizations
              - "AC-6"    # Least Privilege
              - "AC-6(1)" # Authorize Access to Security Functions
              - "AC-6(5)" # Privileged Accounts
              - "CM-7"    # Least Functionality
              - "PL-1"    # Planning Policy and Procedures
              - "SA-8"    # Security and Privacy Engineering Principles
            nist_ai_rmf:
              - "GOVERN 1.1"  # Legal and regulatory requirements identified
              - "GOVERN 1.2"  # AI system trustworthiness characteristics
              - "GOVERN 1.5"  # Ongoing monitoring processes
              - "GOVERN 1.7"  # Testing and evaluation processes
              - "MANAGE 1.1"  # Risk treatment plans implemented
              - "MANAGE 1.4"  # Risk treatments monitored
            nist_800_171:
              - "3.1.1"   # Limit system access to authorized users
              - "3.1.2"   # Limit system access to authorized transactions
              - "3.1.5"   # Least privilege
              - "3.4.1"   # Baseline configurations
              - "3.4.2"   # Security configuration settings enforcement
            eu_ai_act:
              - "Article 9(4)(e)"  # Risk management measures for intended purpose
              - "Article 14(1)"    # Human oversight design
              - "Article 14(4)(a)" # Fully understand capacities/limitations
              - "Article 17(1)"    # Quality management system
            iso_42001:
              - "A.5.2"   # AI policy
              - "A.5.3"   # AI governance framework
              - "A.6.1.3" # AI system lifecycle management
              - "A.6.2.2" # AI system design documentation
              - "A.9.3"   # AI system conformity evaluation
            iso_27001:
              - "A.5.1"   # Policies for information security
              - "A.5.2"   # Information security roles and responsibilities
              - "A.5.15"  # Access control
              - "A.5.18"  # Access rights
              - "A.8.3"   # Information access restriction
            soc2:
              - "CC5.1"   # Selection and development of control activities
              - "CC5.2"   # Relevant policies and procedures
              - "CC5.3"   # Technology controls deployed
              - "CC6.1"   # Logical and physical access controls
              - "CC6.3"   # Role-based access authorization
            cmmc:
              - "AC.L2-3.1.1"  # Authorized access control
              - "AC.L2-3.1.2"  # Transaction and function control
              - "AC.L2-3.1.5"  # Least privilege
              - "CM.L2-3.4.1"  # System baselining
              - "CM.L2-3.4.2"  # Security configuration enforcement
            fedramp:
              - "AC-1"    # Access Control Policy
              - "AC-3"    # Access Enforcement
              - "AC-6"    # Least Privilege
              - "CM-7"    # Least Functionality
              - "PL-1"    # Security Planning Policy
            gdpr:
              - "Article 25(1)"    # Data protection by design
              - "Article 25(2)"    # Data protection by default
              - "Article 32(1)(b)" # Ongoing confidentiality, integrity, availability
              - "Article 5(1)(f)"  # Integrity and confidentiality principle
            singapore_pdpa:
              - "Section 24"    # Protection of personal data
              - "Section 11(1)" # Organisation's responsibility
              - "Section 12"    # Consent obligation
            japan_appi:
              - "Article 23"   # Security control measures
              - "Article 20"   # Accurate and up-to-date data
              - "Article 21"   # Safety control action
            cosais:
              - "AIS-AC.01"  # AI system access control policy
              - "AIS-AC.02"  # AI capability access enforcement
              - "AIS-CM.01"  # AI system configuration management

        # --- Circuit Breaker ---
        - name: "circuit_breaker"
          id: "ENFORCE.circuit_breaker"
          description: "System-wide autonomous safety halt mechanism with three states (CLOSED/OPEN/HALF_OPEN). Triggers on: high-risk threshold (>10%), injection detection, critical drift, tripwire cascade (3 in 60s), entity misbehavior (10 violations), critic block cascade (5), and velocity abuse. Thread-safe with auto-reset (300s) and configurable half-open recovery testing"
          implementation: "cognigate/app/core/circuit_breaker.py"
          evidence_type: "proof_chain_event"
          evidence_path: "PROOF.circuit_trip"
          controls:
            nist_800_53:
              - "IR-4"    # Incident Handling
              - "IR-4(1)" # Automated Incident Handling
              - "IR-5"    # Incident Monitoring
              - "IR-6"    # Incident Reporting
              - "SI-17"   # Fail-Safe Procedures
              - "SC-24"   # Fail in Known State
              - "CP-2"    # Contingency Plan
              - "CP-10"   # System Recovery and Reconstitution
