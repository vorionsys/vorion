# =============================================================================
# FRAMEWORK NAMING NORMALIZATION
# =============================================================================
# Canonical framework identifiers with aliases for cross-artifact consistency.
# The control-registry.yaml uses snake_case identifiers. The Cognigate runtime
# uses UPPER-KEBAB-CASE identifiers. This file provides a normalization mapping
# so that any system can resolve any alias to the canonical form.
#
# Maintained by: Vorion Compliance Engineering
# Referenced by: control-registry.yaml, Cognigate runtime, OSCAL artifacts
# =============================================================================

