##
# Test infrastructure for integration tests.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   npx turbo test:integration
#   docker compose -f docker-compose.test.yml down -v
#
# CI:
#   The CI pipeline starts these services before running integration tests
#   and tears them down afterward. Volumes are ephemeral.
##

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vorion_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: vorion_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vorion_test -d vorion_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
    command: >
      postgres
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
        -c max_connections=50

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      redis-server
        --save ""
        --appendonly no
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
