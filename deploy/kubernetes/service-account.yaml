---
# Vorion API ServiceAccount
# Minimal permissions following principle of least privilege
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vorion-api
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: vorion
  annotations:
    # Disable automatic secret creation (Kubernetes 1.24+)
    kubernetes.io/enforce-mountable-secrets: "true"
# Do not auto-mount API credentials
automountServiceAccountToken: false

---
# Role for minimal required permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vorion-api
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: vorion
rules:
  # Allow reading configmaps (for dynamic config if needed)
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["vorion-config"]
    verbs: ["get", "watch"]

  # Allow reading own pod information (for leader election, etc.)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Allow creating events (for logging/auditing)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
# RoleBinding to associate ServiceAccount with Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vorion-api
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: vorion
subjects:
  - kind: ServiceAccount
    name: vorion-api
    namespace: vorion
roleRef:
  kind: Role
  name: vorion-api
  apiGroup: rbac.authorization.k8s.io

---
