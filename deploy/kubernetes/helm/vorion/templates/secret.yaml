{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vorion.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vorion.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.values.dbUser }}
  DB_USER: {{ .Values.secrets.values.dbUser | quote }}
  {{- end }}
  {{- if .Values.secrets.values.dbPassword }}
  DB_PASSWORD: {{ .Values.secrets.values.dbPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.values.redisPassword }}
  REDIS_PASSWORD: {{ .Values.secrets.values.redisPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.values.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.values.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.values.jwtRefreshSecret }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.values.jwtRefreshSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.values.encryptionKey }}
  ENCRYPTION_KEY: {{ .Values.secrets.values.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.values.sessionSecret }}
  SESSION_SECRET: {{ .Values.secrets.values.sessionSecret | quote }}
  {{- end }}
{{- end }}
