---
# Vorion Secrets Template
# IMPORTANT: Replace placeholders with base64-encoded values before applying
# Generate base64: echo -n 'your-value' | base64
#
# For production, use a secrets management solution:
# - HashiCorp Vault with External Secrets Operator
# - AWS Secrets Manager with External Secrets
# - Azure Key Vault with CSI Driver
# - Sealed Secrets for GitOps
apiVersion: v1
kind: Secret
metadata:
  name: vorion-secrets
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: vorion
  annotations:
    # Prevent accidental deletion
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Database credentials
  # echo -n 'vorion_app' | base64
  DB_USER: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n 'your-secure-password' | base64
  DB_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Redis credentials (if authentication enabled)
  # echo -n 'your-redis-password' | base64
  REDIS_PASSWORD: REPLACE_WITH_BASE64_ENCODED_VALUE

  # JWT configuration
  # echo -n 'your-jwt-secret-min-32-chars-long' | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE
  # echo -n 'your-refresh-token-secret' | base64
  JWT_REFRESH_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE

  # API keys
  # echo -n 'your-internal-api-key' | base64
  INTERNAL_API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Encryption key for sensitive data at rest
  # echo -n 'your-32-byte-encryption-key-here' | base64
  ENCRYPTION_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Session secret
  # echo -n 'your-session-secret' | base64
  SESSION_SECRET: REPLACE_WITH_BASE64_ENCODED_VALUE

---
# TLS Certificate Secret (for internal mTLS if needed)
# Replace with actual certificate data or use cert-manager
apiVersion: v1
kind: Secret
metadata:
  name: vorion-tls
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: vorion
type: kubernetes.io/tls
data:
  # Base64-encoded certificate
  tls.crt: REPLACE_WITH_BASE64_ENCODED_CERTIFICATE
  # Base64-encoded private key
  tls.key: REPLACE_WITH_BASE64_ENCODED_PRIVATE_KEY

---
# Image Pull Secret Template (if using private registry)
# apiVersion: v1
# kind: Secret
# metadata:
#   name: vorion-registry
#   namespace: vorion
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG
