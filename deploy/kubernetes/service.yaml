---
# Vorion API Service
# ClusterIP service for internal communication
apiVersion: v1
kind: Service
metadata:
  name: vorion-api
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: vorion
  annotations:
    # Service discovery annotations
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  # Session affinity for consistent routing (optional)
  sessionAffinity: None
  selector:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP

---
# Headless service for direct pod access (useful for debugging)
apiVersion: v1
kind: Service
metadata:
  name: vorion-api-headless
  namespace: vorion
  labels:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: vorion
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: vorion
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
