# ==========================================================================
# Networks
# ==========================================================================

networks:
  vorion-internal:
    driver: bridge
    # Internal network - no external access
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "false"

# ==========================================================================
# Volumes
# ==========================================================================

volumes:
  api-data:
    driver: local
  worker-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
  # minio-data:
