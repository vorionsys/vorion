# Local development/testing with Docker
# Run: docker-compose up --build

services:
  cognigate-api:
    build:
      context: ../..  # Monorepo root
      dockerfile: apps/cognigate-api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SQLITE_PATH=/app/data/cognigate.db
    volumes:
      - cognigate-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cognigate-data:
